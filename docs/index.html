<!DOCTYPE html>
<html>
    <head>
        <title>Lumiere's SpyParty Drafting Tool</title>
        <script src="js/utils.js"></script>
        <script src="js/import.js"></script>
        <link rel="style.css" />
    </head>
    
    <body>
        <h1>Lumiere's SpyParty Drafting Tool</h1>
        <p id="status"></p>
        <form>
            <p>
            <label for="competition">Competition</label>:
            <select name="competition" id="competition">
                <option value="NONE" selected>Select a Competition</option>
            </select>
            </p>

            <p><label for="player1">Player 1</label>: 
            <input type="text" name="player1" id="player1" required />
            <label for="player2">Player 2</label>: 
            <input type="text" name="player2" id="player2" required /> 
            <input type="button" id="set_players" value="Set Players" /></p>

            <hr />
            <h3>Determine Order</h3>
            <p id="choosefirst"></p>
            <p id="whochoosefirst_paragraph"></p>
            <p id="spysnipe_or_pick_paragraph"></p>
            <p id="spysnipe_paragraph"></p>
            <p id="pick_paragraph"></p>
            <!--p id="populate_venues"><input type="button" name="populate_venues" value="Populate Venues" onclick="do_populate_venuesets();"/></p-->

            <h3 id="pick_and_ban_header">Picks and Bans</h3>
            <p id="picks_and_bans"></p>
            <p id="dostep"><input type="button" name="donextstep" value="Confirm Pick/Ban Step" onclick="do_draft_step();"/></p>

            <input type="button" name="generate" id="generate" value="Generate Draft Text" onclick="generate_draft();">
            <hr />
            <textarea rows="15" cols="60" id="draft_text">Competition Draft appears here</textarea>
            <textarea rows="15" cols="60" id="map_playlist">Ordered list of Maps to play</textarea>


            
        </form>

        <script src="js/competition.js"></script>
        <script src="js/ordering.js"></script>
        <script src="js/players.js"></script>
        <script src="js/picks.js"></script>
        <script src="js/generate.js"></script>
    </body>
</html>
